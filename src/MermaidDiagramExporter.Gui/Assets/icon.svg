<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="node1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#1e88e5"/>
    </linearGradient>
    <linearGradient id="node2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#43a047"/>
    </linearGradient>
    <linearGradient id="node3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#fb8c00"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg)"/>
  <!-- Class node 1 (top-left) -->
  <rect x="36" y="44" width="80" height="60" rx="8" ry="8" fill="url(#node1)" opacity="0.95"/>
  <rect x="36" y="44" width="80" height="20" rx="8" ry="8" fill="#1565c0" opacity="0.6"/>
  <rect x="36" y="56" width="80" height="8" fill="#1565c0" opacity="0.6"/>
  <text x="76" y="58" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="bold">Class</text>
  <line x1="44" y1="76" x2="108" y2="76" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="44" y1="86" x2="100" y2="86" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="44" y1="94" x2="96" y2="94" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Class node 2 (top-right) -->
  <rect x="140" y="36" width="80" height="60" rx="8" ry="8" fill="url(#node2)" opacity="0.95"/>
  <rect x="140" y="36" width="80" height="20" rx="8" ry="8" fill="#2e7d32" opacity="0.6"/>
  <rect x="140" y="48" width="80" height="8" fill="#2e7d32" opacity="0.6"/>
  <text x="180" y="50" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="bold">IFoo</text>
  <line x1="148" y1="68" x2="212" y2="68" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="148" y1="78" x2="204" y2="78" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="148" y1="86" x2="200" y2="86" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Inheritance arrow: node2 → node1 (dashed implements) -->
  <path d="M140,66 L120,66 L120,74 L116,74 L116,70" stroke="#e0e0e0" stroke-width="2.5" fill="none" stroke-dasharray="6,3" opacity="0.8"/>
  <polygon points="116,62 110,74 122,74" fill="#e0e0e0" opacity="0.8"/>
  <!-- Class node 3 (bottom-center) -->
  <rect x="88" y="140" width="80" height="60" rx="8" ry="8" fill="url(#node3)" opacity="0.95"/>
  <rect x="88" y="140" width="80" height="20" rx="8" ry="8" fill="#e65100" opacity="0.6"/>
  <rect x="88" y="152" width="80" height="8" fill="#e65100" opacity="0.6"/>
  <text x="128" y="154" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="bold">Bar</text>
  <line x1="96" y1="172" x2="160" y2="172" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="96" y1="182" x2="152" y2="182" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="96" y1="190" x2="148" y2="190" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Association arrow: node1 → node3 -->
  <path d="M76,104 L76,122 L108,122 L108,140" stroke="#e0e0e0" stroke-width="2" fill="none" opacity="0.7"/>
  <polygon points="108,136 104,144 112,144" fill="#e0e0e0" opacity="0.7"/>
  <!-- Mermaid "M" watermark -->
  <text x="200" y="220" text-anchor="middle" fill="white" font-family="serif" font-size="36" font-weight="bold" opacity="0.15">M</text>
